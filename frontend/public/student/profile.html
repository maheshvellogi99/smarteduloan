<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Profile — SmartEduLoan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        /* Tab bar */
        .tab-bar { display:flex; gap:0.25rem; margin-bottom:1.75rem; background:var(--surface-2); border-radius:var(--radius); padding:4px; }
        .tab-bar button { flex:1; padding:0.6rem 1rem; border:none; background:transparent; color:var(--text-muted); font-family:'Inter',sans-serif; font-size:0.8125rem; font-weight:600; border-radius:var(--radius-sm); cursor:pointer; transition:all 0.2s; }
        .tab-bar button.active { background:var(--surface-0); color:var(--primary); box-shadow:var(--shadow-sm); }
        .tab-content { display:none; animation:fadeIn 0.3s var(--ease); }
        .tab-content.active { display:block; }

        /* Score row */
        .score-row { display:grid; grid-template-columns:1fr 1.5fr 0.7fr 0.7fr 1fr auto; gap:0.5rem; align-items:center; margin-bottom:0.5rem; padding:0.5rem; background:var(--surface-2); border-radius:var(--radius-sm); }
        .score-row select, .score-row input { font-size:0.8125rem; padding:0.5rem; }
        .remove-row-btn { background:var(--danger-dim); border:1px solid rgba(239,68,68,0.15); color:var(--danger); border-radius:var(--radius-sm); width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.7rem; }

        /* JEE toggle */
        .jee-checkbox { display:flex; align-items:center; gap:0.5rem; margin-bottom:1rem; }
        .jee-checkbox input[type="checkbox"] { width:auto; }

        /* Doc grid */
        .doc-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0.75rem; }
        .doc-slot { background:var(--surface-0); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; }
        .doc-slot h4 { font-size:0.8125rem; font-weight:600; color:var(--text); margin-bottom:0.25rem; }
        .file-info { font-size:0.75rem; color:var(--text-muted); margin-bottom:0.25rem; }
        .doc-upload-btn { display:inline-flex; align-items:center; gap:0.25rem; padding:0.3rem 0.6rem; background:var(--primary-dim); border:1px solid rgba(79,70,229,0.15); color:var(--primary); border-radius:var(--radius-sm); font-size:0.6875rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:'Inter',sans-serif; }
        .doc-upload-btn:hover { background:rgba(79,70,229,0.12); }

        @media(max-width:768px) {
            .score-row { grid-template-columns:1fr 1fr; }
            .doc-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="content-wrapper">
        <div class="mobile-topbar" id="mobile-topbar"></div>

        <main class="main-content">
            <div class="page-header">
                <h1>Credit Profile</h1>
            </div>

            <div id="loading" class="loading-msg">Loading profile...</div>

            <div id="profile-content" style="display:none;">
                <div id="profile-message" style="display:none;" class="alert"></div>

                <!-- Tab Bar -->
                <div class="tab-bar">
                    <button class="active" onclick="switchTab('basic',this)">📋 Basic Info</button>
                    <button onclick="switchTab('scores',this)">📊 Study Scores</button>
                    <button onclick="switchTab('docs',this)">📎 Documents</button>
                </div>

                <!-- Tab 1: Basic Info -->
                <div class="tab-content active" id="tab-basic">
                    <div class="glass-card">
                        <form id="profile-form">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="form-group">
                                    <label>Course Name</label>
                                    <input type="text" id="courseName" placeholder="e.g. B.Tech CSE" required />
                                </div>
                                <div class="form-group">
                                    <label>Academic Score (%)</label>
                                    <input type="number" id="academicScore" min="0" max="100" required />
                                </div>
                                <div class="form-group">
                                    <label>Attendance (%)</label>
                                    <input type="number" id="attendance" min="0" max="100" required />
                                </div>
                                <div class="form-group">
                                    <label>Internship Status</label>
                                    <select id="internshipStatus">
                                        <option value="none">No Internship</option>
                                        <option value="ongoing">Ongoing</option>
                                        <option value="completed">Completed</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Annual Family Income (₹)</label>
                                    <input type="number" id="familyIncome" min="0" required />
                                </div>
                                <div class="form-group">
                                    <label>Previous Loan History</label>
                                    <select id="previousLoanHistory">
                                        <option value="none">No Previous Loans</option>
                                        <option value="repaid">Repaid on Time</option>
                                        <option value="defaulted">Defaulted</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Spending Behaviour Score (0–100)</label>
                                <input type="number" id="spendingBehaviorScore" min="0" max="100" />
                            </div>
                            <button type="submit" id="save-btn" class="btn btn-primary btn-lg btn-block">Save & Calculate Credit Score</button>
                        </form>
                    </div>
                </div>

                <!-- Tab 2: Study Scores -->
                <div class="tab-content" id="tab-scores">
                    <div class="glass-card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                            <h3 style="font-size:1rem; font-weight:700; color:var(--text);">Academic History</h3>
                            <button type="button" class="btn btn-outline btn-sm" onclick="addScoreRow()">+ Add Row</button>
                        </div>
                        <div id="scores-container"></div>

                        <hr class="divider" />

                        <!-- JEE Section -->
                        <h3 style="font-size:1rem; font-weight:700; color:var(--text); margin-bottom:1rem;">JEE Details</h3>
                        <div class="jee-checkbox">
                            <input type="checkbox" id="jee-appeared" onchange="toggleJeeFields(this.checked)" />
                            <label for="jee-appeared" style="font-size:0.8125rem; color:var(--text-secondary); cursor:pointer;">I appeared for JEE</label>
                        </div>
                        <div id="jee-fields" style="display:none;">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="form-group"><label>Year</label><input type="number" id="jee-year" placeholder="2024" /></div>
                                <div class="form-group"><label>Mains Rank</label><input type="number" id="jee-mains-rank" placeholder="e.g. 15000" /></div>
                                <div class="form-group"><label>Mains Percentile</label><input type="number" step="0.01" id="jee-mains-percentile" placeholder="e.g. 97.5" /></div>
                                <div class="form-group"><label>Advanced Rank</label><input type="number" id="jee-advanced-rank" placeholder="Optional" /></div>
                            </div>
                        </div>

                        <button type="button" id="save-scores-btn" class="btn btn-primary btn-lg btn-block" onclick="saveStudyScores()">Save Study Scores</button>
                    </div>
                </div>

                <!-- Tab 3: Documents -->
                <div class="tab-content" id="tab-docs">
                    <div class="glass-card">
                        <p style="font-size:0.8125rem; color:var(--text-muted); margin-bottom:1.25rem;">Upload your KYC documents. Accepted formats: JPG, PNG, PDF (max 5MB each).</p>
                        <div id="docs-grid" class="doc-grid"></div>
                        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.pdf,.webp" style="display:none;" />
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/student.js"></script>
<script>
    const user = utils.checkAuth(['student']);
    if (user) {
        utils.setupSidebar(user);
        loadCreditProfile();
    }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
