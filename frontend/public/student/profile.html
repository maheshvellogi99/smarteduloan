<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEduLoan — Credit Profile</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .tab-bar { display:flex; gap:3px; padding:3px; background:var(--surface-2); border-radius:var(--radius); margin-bottom:2rem; }
        .tab-bar button { flex:1; padding:0.6rem 1rem; background:transparent; border:none; border-radius:var(--radius-sm); font-size:0.8125rem; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; color:var(--text-muted); transition:all 0.25s var(--ease); }
        .tab-bar button.active { background:var(--surface-1); color:#fff; box-shadow:var(--shadow-sm); }
        .tab-bar button:hover:not(.active) { color:var(--text-secondary); }
        .tab-panel { display:none; animation:fadeIn 0.3s ease; }
        .tab-panel.active { display:block; }

        .score-row { display:grid; grid-template-columns:1fr 1fr 1fr 1fr 1fr auto; gap:0.5rem; align-items:center; margin-bottom:0.625rem; }
        .score-row input, .score-row select { padding:0.55rem 0.75rem; font-size:0.8125rem; }
        .remove-row-btn { background:var(--danger-dim); border:1px solid rgba(248,113,113,0.15); color:var(--danger); border-radius:var(--radius-sm); padding:0.4rem 0.7rem; cursor:pointer; font-size:0.75rem; font-family:'Inter',sans-serif; transition:all 0.2s; }
        .remove-row-btn:hover { background:rgba(248,113,113,0.15); }

        .doc-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1rem; }
        .doc-slot { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; display:flex; flex-direction:column; gap:0.625rem; transition:all 0.25s var(--ease); }
        .doc-slot:hover { border-color:var(--border-hover); transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,0.3); }
        .doc-slot h4 { font-size:0.75rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; }
        .doc-slot .file-info { font-size:0.75rem; color:var(--text-muted); }
        .doc-upload-btn { display:inline-flex; align-items:center; gap:0.375rem; background:var(--primary-dim); border:1px solid rgba(124,92,252,0.15); color:var(--primary-light); border-radius:var(--radius-sm); padding:0.4rem 0.75rem; font-size:0.75rem; cursor:pointer; font-family:'Inter',sans-serif; font-weight:600; transition:all 0.2s; }
        .doc-upload-btn:hover { background:rgba(124,92,252,0.15); transform:translateY(-1px); }

        @media(max-width:768px) { .tab-bar { flex-direction:column; } .doc-grid { grid-template-columns:1fr; } .score-row { grid-template-columns:1fr 1fr; } }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <div class="content-wrapper">
            <div class="mobile-topbar" id="mobile-topbar"></div>
            <main class="main-content">
                <div class="page-header">
                    <h1>Credit Profile</h1>
                </div>
                <p class="text-muted text-sm" style="margin-top:-1.5rem; margin-bottom:1.75rem;">Complete all sections to determine your loan eligibility.</p>

                <div id="profile-message" class="alert" style="display:none;"></div>
                <div id="loading" class="loading-msg">Loading...</div>

                <div id="profile-content" style="display:none;">
                    <div class="tab-bar">
                        <button class="active" onclick="switchTab('basic',this)">📝 Basic Info</button>
                        <button onclick="switchTab('scores',this)">📊 Study Scores</button>
                        <button onclick="switchTab('documents',this)">📎 Documents</button>
                    </div>

                    <!-- Tab 1: Basic Info -->
                    <div class="tab-panel active" id="tab-basic">
                        <form id="profile-form">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="form-group"><label>Course / Program</label><input type="text" id="courseName" placeholder="Ex. B.Tech CSE" required /></div>
                                <div class="form-group"><label>Academic Score (%)</label><input type="number" id="academicScore" min="0" max="100" required /></div>
                                <div class="form-group"><label>Attendance (%)</label><input type="number" id="attendance" min="0" max="100" required /></div>
                                <div class="form-group"><label>Internship Status</label><select id="internshipStatus"><option value="none">None</option><option value="ongoing">Ongoing</option><option value="completed">Completed</option></select></div>
                                <div class="form-group"><label>Family Income (₹/year)</label><input type="number" id="familyIncome" min="0" required /></div>
                                <div class="form-group"><label>Previous Loan History</label><select id="previousLoanHistory"><option value="none">None</option><option value="no defaults">No defaults</option><option value="defaults">Past default</option></select></div>
                                <div class="form-group"><label>Spending Score (0–100)</label><input type="number" id="spendingBehaviorScore" min="0" max="100" required /></div>
                            </div>
                            <button type="submit" class="btn btn-primary mt-6" id="save-btn">Save & Calculate Credit Score</button>
                        </form>
                    </div>

                    <!-- Tab 2: Study Scores -->
                    <div class="tab-panel" id="tab-scores">
                        <div class="flex justify-between items-center mb-4">
                            <p class="text-muted text-sm">Academic history — verified against your documents.</p>
                            <button onclick="addScoreRow()" class="btn btn-primary btn-sm">+ Add Row</button>
                        </div>
                        <div class="score-row" style="color:var(--text-muted);font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.375rem;">
                            <span>Level</span><span>Institution</span><span>Year</span><span>%</span><span>Remarks</span><span></span>
                        </div>
                        <div id="scores-container"></div>

                        <hr class="divider" style="margin-top:1.5rem;">
                        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.875rem;font-weight:500;">
                            <input type="checkbox" id="jee-appeared" onchange="toggleJeeFields(this.checked)" style="width:1rem;height:1rem;accent-color:var(--primary);">
                            I appeared for JEE (Mains / Advanced)
                        </label>
                        <div id="jee-fields" style="display:none;margin-top:1rem;">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="form-group"><label>JEE Exam Year</label><input type="number" id="jee-year" placeholder="e.g. 2024" /></div>
                                <div class="form-group"><label>JEE Mains Rank</label><input type="number" id="jee-mains-rank" placeholder="AIR" /></div>
                                <div class="form-group"><label>JEE Mains Percentile</label><input type="number" id="jee-mains-percentile" placeholder="e.g. 95.5" step="0.01" /></div>
                                <div class="form-group"><label>JEE Advanced Rank</label><input type="number" id="jee-advanced-rank" placeholder="AIR (if appeared)" /></div>
                            </div>
                        </div>
                        <button onclick="saveStudyScores()" class="btn btn-primary mt-6" id="save-scores-btn">Save Study Scores</button>
                    </div>

                    <!-- Tab 3: Documents -->
                    <div class="tab-panel" id="tab-documents">
                        <p class="text-muted text-sm mb-6">Upload clear scans of your documents. Admin will verify these.</p>
                        <div class="doc-grid" id="docs-grid"></div>
                        <input type="file" id="file-input" style="display:none;" accept="image/*,application/pdf" />
                    </div>
                </div>
            </main>
        </div>
    </div>
    <nav class="bottom-nav" id="bottom-nav"></nav>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/student.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = utils.checkAuth(['student']);
            if (!user) return;
            utils.setupSidebar(user);
            await loadCreditProfile();
        });
        function switchTab(name, btnEl) {
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
        }
    </script>
</body>
</html>
