<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Loan — SmartEduLoan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .eligibility-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:1.5rem; }
        .elig-item { background:var(--surface-0); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; text-align:center; }
        .elig-label { font-size:0.625rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-bottom:0.25rem; }
        .elig-value { font-family:'Outfit',sans-serif; font-size:1.25rem; font-weight:700; color:var(--primary); }

        /* Prerequisite blocker */
        .prereq-blocker { background:var(--surface-0); border:1px solid var(--border); border-radius:var(--radius-xl); padding:2rem; margin-bottom:1.5rem; box-shadow:var(--shadow-sm); }
        .prereq-title { font-size:1.125rem; font-weight:700; color:var(--danger); margin-bottom:0.5rem; }
        .prereq-subtitle { font-size:0.875rem; color:var(--text-muted); margin-bottom:1.25rem; }
        .prereq-list { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:1.5rem; }
        .prereq-row { display:flex; align-items:center; gap:0.75rem; padding:0.625rem 0.875rem; border-radius:var(--radius-sm); font-size:0.8125rem; }
        .prereq-ok { background:rgba(16,185,129,0.06); color:#059669; }
        .prereq-missing { background:rgba(239,68,68,0.06); color:#DC2626; }
        .prereq-icon { font-size:1rem; }
        .prereq-badge { margin-left:auto; font-size:0.625rem; font-weight:700; text-transform:uppercase; padding:0.15rem 0.5rem; border-radius:var(--radius-full); background:rgba(239,68,68,0.08); color:var(--danger); }
        .prereq-cta { margin-top:0.5rem; }

        @media(max-width:768px) { .eligibility-strip { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="content-wrapper">
        <div class="mobile-topbar" id="mobile-topbar"></div>

        <main class="main-content">
            <div class="page-header">
                <h1>Apply for Loan</h1>
            </div>

            <div id="loading" class="loading-msg">Checking eligibility...</div>

            <div id="no-profile-warning" style="display:none;">
                <div class="glass-card" style="text-align:center; padding:3rem;">
                    <div style="font-size:2.5rem; margin-bottom:1rem;">📝</div>
                    <h3 style="margin-bottom:0.5rem;">Profile Required</h3>
                    <p class="text-muted" style="margin-bottom:1.5rem;">You must complete your Credit Profile before applying for a loan.</p>
                    <a href="/student/profile.html" class="btn btn-primary">Complete Profile →</a>
                </div>
            </div>

            <div id="apply-message" style="display:none;" class="alert"></div>

            <form id="apply-form" style="display:none;">
                <div class="glass-card">
                    <!-- Eligibility Strip -->
                    <div class="eligibility-strip">
                        <div class="elig-item">
                            <div class="elig-label">Max Eligible</div>
                            <div class="elig-value" id="max-amount">—</div>
                        </div>
                        <div class="elig-item">
                            <div class="elig-label">Recommended Rate</div>
                            <div class="elig-value" id="rec-rate">—</div>
                        </div>
                        <div class="elig-item">
                            <div class="elig-label">Credit Score</div>
                            <div class="elig-value" id="credit-score-display">—</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label>Loan Type</label>
                            <select id="loanType" required>
                                <option value="education">Education</option>
                                <option value="personal">Personal</option>
                                <option value="skill">Skill Development</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Requested Amount (₹)</label>
                            <input type="number" id="requestedAmount" min="10000" required placeholder="e.g. 500000" />
                        </div>
                        <div class="form-group">
                            <label>Tenure (Months)</label>
                            <input type="number" id="tenureMonths" min="6" max="120" value="24" required />
                        </div>
                        <div class="form-group">
                            <label>Bank Product</label>
                            <select id="bankProductId" required></select>
                        </div>
                    </div>

                    <button type="submit" id="apply-btn" class="btn btn-primary btn-lg btn-block">Submit Application</button>
                </div>
            </form>
        </main>

        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/student.js"></script>
<script>
    const user = utils.checkAuth(['student']);
    if (user) {
        utils.setupSidebar(user);
        loadApplyPage();
    }
</script>
</body>
</html>
