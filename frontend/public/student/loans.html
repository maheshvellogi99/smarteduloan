<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Loans — SmartEduLoan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        /* Loan summary strip */
        .loan-summary-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:0.75rem; margin-bottom:1.75rem; }
        .ls-item { background:var(--surface-0); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; text-align:center; box-shadow:var(--shadow-sm); }
        .ls-item .ls-val { font-family:'Outfit',sans-serif; font-size:1.5rem; font-weight:700; color:var(--text); }
        .ls-item .ls-label { font-size:0.625rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-top:0.25rem; }

        /* Loan cards */
        .loan-card { background:var(--surface-0); border:1px solid var(--border); border-radius:var(--radius-xl); padding:1.5rem; margin-bottom:1rem; transition:all 0.3s var(--ease); box-shadow:var(--shadow-sm); }
        .loan-card:hover { border-color:var(--border-hover); box-shadow:var(--shadow); }
        .loan-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; flex-wrap:wrap; gap:0.5rem; }
        .loan-type-badge { font-size:0.625rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--primary); background:var(--primary-dim); padding:0.2rem 0.625rem; border-radius:var(--radius-full); }
        .loan-amount { font-family:'Outfit',sans-serif; font-size:1.25rem; font-weight:700; color:var(--text); margin-left:0.5rem; }
        .loan-status-pill { font-size:0.6875rem; font-weight:700; padding:0.25rem 0.75rem; border-radius:var(--radius-full); }
        .loan-card-meta { display:flex; flex-wrap:wrap; gap:1rem; font-size:0.8125rem; color:var(--text-muted); }
        .loan-card-meta strong { color:var(--text-secondary); }
        .loan-rejection-note { background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.12); color:#DC2626; padding:0.75rem; border-radius:var(--radius-sm); margin-top:0.75rem; font-size:0.8125rem; }
        .loan-disbursal-info { background:rgba(16,185,129,0.06); border:1px solid rgba(16,185,129,0.12); color:#059669; padding:0.75rem; border-radius:var(--radius-sm); margin-top:0.75rem; font-size:0.8125rem; }

        @media(max-width:768px) { .loan-summary-strip { grid-template-columns:repeat(2,1fr); } }
        @media(max-width:480px) { .loan-summary-strip { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="content-wrapper">
        <div class="mobile-topbar" id="mobile-topbar"></div>

        <main class="main-content">
            <div class="page-header">
                <h1>My Loans</h1>
                <a href="/student/apply.html" class="btn btn-primary btn-sm">+ New Application</a>
            </div>

            <div id="loading" class="loading-msg">Loading your loans...</div>

            <div id="loans-content" style="display:none;">
                <!-- Summary Strip -->
                <div class="loan-summary-strip">
                    <div class="ls-item"><div class="ls-val" id="ls-total">0</div><div class="ls-label">Total</div></div>
                    <div class="ls-item" style="border-top:3px solid #10B981;"><div class="ls-val" id="ls-approved">0</div><div class="ls-label">Approved</div></div>
                    <div class="ls-item" style="border-top:3px solid #F59E0B;"><div class="ls-val" id="ls-pending">0</div><div class="ls-label">Pending</div></div>
                    <div class="ls-item" style="border-top:3px solid #EF4444;"><div class="ls-val" id="ls-rejected">0</div><div class="ls-label">Rejected</div></div>
                </div>

                <!-- Chart -->
                <div class="dashboard-row" style="margin-bottom:1.75rem;">
                    <div class="chart-card" id="student-loans-chart-card" style="display:none;">
                        <div class="chart-title">Loan Distribution</div>
                        <div class="chart-wrapper">
                            <canvas id="chart-my-loans"></canvas>
                        </div>
                    </div>
                    <div></div>
                </div>

                <!-- Loan Cards -->
                <div id="loan-cards"></div>
            </div>
        </main>

        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/student.js"></script>
<script>
    const user = utils.checkAuth(['student']);
    if (user) {
        utils.setupSidebar(user);
        loadMyLoans();
    }
</script>
</body>
</html>
