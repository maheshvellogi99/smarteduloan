<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Dashboard — SmartEduLoan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        /* Tab switcher */
        .bank-tabs { display:flex; gap:0.5rem; margin-bottom:1.75rem; }
        .bank-tabs button { padding:0.6rem 1.5rem; border:1px solid var(--border); background:var(--surface-0); color:var(--text-muted); font-family:'Inter',sans-serif; font-size:0.8125rem; font-weight:600; border-radius:var(--radius-full); cursor:pointer; transition:all 0.2s; }
        .bank-tabs button.active { background:var(--primary); color:#fff; border-color:var(--primary); box-shadow:0 2px 8px rgba(79,70,229,0.25); }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
        .table-responsive { overflow-x:auto; }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="content-wrapper">
        <div class="mobile-topbar" id="mobile-topbar"></div>

        <main class="main-content">
            <div class="page-header">
                <h1>Bank Dashboard</h1>
            </div>

            <div id="loading" class="loading-msg">Loading...</div>

            <div id="bank-dashboard-content" style="display:none;">
                <!-- Stats -->
                <div class="bank-stat-grid">
                    <div class="stat-card stat-card-primary">
                        <div class="stat-icon-circle ico-primary">📦</div>
                        <div class="stat-label">Products</div>
                        <div class="stat-value" id="stat-products">0</div>
                    </div>
                    <div class="stat-card stat-card-info">
                        <div class="stat-icon-circle ico-info">📋</div>
                        <div class="stat-label">Assigned Loans</div>
                        <div class="stat-value" id="stat-loans">0</div>
                    </div>
                    <div class="stat-card stat-card-warning">
                        <div class="stat-icon-circle ico-warning">⏳</div>
                        <div class="stat-label">Pending Review</div>
                        <div class="stat-value" id="stat-pending">0</div>
                    </div>
                    <div class="stat-card stat-card-success">
                        <div class="stat-icon-circle ico-success">📊</div>
                        <div class="stat-label">Avg Rate</div>
                        <div class="stat-value" id="stat-avg-rate">0%</div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="bank-tabs">
                    <button id="btn-tab-products" class="active" onclick="showTab('tab-products')">📦 Products <span class="badge badge-primary" style="margin-left:0.25rem;" id="product-count-badge">0</span></button>
                    <button id="btn-tab-loans" onclick="showTab('tab-loans')">📋 Loan Verification</button>
                </div>

                <!-- Products Tab -->
                <div class="tab-panel active" id="tab-products">
                    <div class="dashboard-row">
                        <!-- Product List -->
                        <div class="glass-card">
                            <div class="section-head">Your Loan Products</div>
                            <div id="products-list"></div>
                        </div>

                        <!-- Add Product Form -->
                        <div>
                            <!-- Chart -->
                            <div class="chart-card" id="product-chart-card" style="display:none; margin-bottom:1rem;">
                                <div class="chart-title">Product Types</div>
                                <div class="chart-wrapper">
                                    <canvas id="chart-product-types"></canvas>
                                </div>
                            </div>

                            <div class="glass-card">
                                <div class="section-head">Add New Product</div>
                                <div id="product-form-msg" style="display:none;" class="alert"></div>
                                <form id="product-form">
                                    <div class="form-group"><label>Product Name</label><input type="text" id="p-name" placeholder="e.g. Education Plus" required /></div>
                                    <div class="form-group"><label>Loan Type</label>
                                        <select id="p-type">
                                            <option value="education">Education</option>
                                            <option value="personal">Personal</option>
                                            <option value="skill">Skill Development</option>
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="form-group"><label>Min Amount (₹)</label><input type="number" id="p-min-amt" placeholder="50000" required /></div>
                                        <div class="form-group"><label>Max Amount (₹)</label><input type="number" id="p-max-amt" placeholder="1000000" required /></div>
                                        <div class="form-group"><label>Interest Rate (%)</label><input type="number" step="0.1" id="p-rate" placeholder="8.5" required /></div>
                                        <div class="form-group"><label>Min Tenure (Months)</label><input type="number" id="p-min-ten" placeholder="6" required /></div>
                                    </div>
                                    <div class="form-group"><label>Max Tenure (Months)</label><input type="number" id="p-max-ten" placeholder="60" required /></div>
                                    <button type="submit" id="add-product-btn" class="btn btn-primary btn-block">Add Product</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Loans Verification Tab -->
                <div class="tab-panel" id="tab-loans">
                    <div id="bank-content" style="display:grid; grid-template-columns:2fr 1fr; gap:1.5rem; align-items:start;">
                        <!-- Loans Table -->
                        <div class="glass-card">
                            <div class="section-head">Assigned Applications</div>
                            <div class="table-responsive" id="bank-loans-table"></div>
                        </div>

                        <!-- Review Panel -->
                        <div>
                            <div class="glass-card" id="bank-review-empty">
                                <div class="empty-state" style="padding:2rem;">
                                    <div class="empty-icon">📋</div>
                                    <p>Select an application to review</p>
                                </div>
                            </div>
                            <div class="glass-card" id="bank-review-content" style="display:none;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/bank.js"></script>
<script>
    const user = utils.checkAuth(['bank']);
    if (user) {
        utils.setupSidebar(user);
        loadBankDashboard();
    }
</script>
</body>
</html>
