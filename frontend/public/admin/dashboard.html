<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — SmartEduLoan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="content-wrapper">
        <div class="mobile-topbar" id="mobile-topbar"></div>

        <main class="main-content">
            <div class="page-header">
                <h1>Overview</h1>
            </div>

            <div id="loading" class="loading-msg">Loading dashboard...</div>

            <div id="admin-content" style="display:none;">
                <!-- Stats -->
                <div class="admin-stat-grid">
                    <div class="stat-card stat-card-primary">
                        <div class="stat-icon-circle ico-primary">📋</div>
                        <div class="stat-label">Total Applications</div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    <div class="stat-card stat-card-success">
                        <div class="stat-icon-circle ico-success">✅</div>
                        <div class="stat-label">Approved</div>
                        <div class="stat-value" id="stat-approved">0</div>
                    </div>
                    <div class="stat-card stat-card-warning">
                        <div class="stat-icon-circle ico-warning">⏳</div>
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="stat-pending">0</div>
                    </div>
                    <div class="stat-card stat-card-danger">
                        <div class="stat-icon-circle ico-danger">❌</div>
                        <div class="stat-label">Rejected</div>
                        <div class="stat-value" id="stat-rejected">0</div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="dashboard-row">
                    <div class="chart-card">
                        <div class="chart-title">Application Status</div>
                        <div class="chart-wrapper-lg">
                            <canvas id="chart-app-status"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">Risk Distribution</div>
                        <div class="chart-wrapper-lg">
                            <canvas id="chart-risk"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav" id="bottom-nav"></nav>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/admin.js"></script>
<script>
    const user = utils.checkAuth(['admin']);
    if (user) {
        utils.setupSidebar(user);
        loadAdminDashboard();
    }
</script>
</body>
</html>
